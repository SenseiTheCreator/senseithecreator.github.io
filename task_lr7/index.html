<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Toys</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <section class="products-section">
        <h1 class="main-title">Обов'язково додайте своє замовлення</h1>
        
        <div class="product-wrap">

            <div class="product-grid">
            <div class="swipe swipe_left">&lt;</div>
            <div class="swipe swipe_right">&gt;</div>
            
                <div class="product-card">
                    <span class="badge new">новинка</span>
                    <p class="category"> 
                        <a href="https://rozetka.com.ua/ua/soft_toys/c99051/" target="_blank">
                            М'які іграшки
                        </a>
                    </p>
                    <div class="line"></div>
                    <img src="images/labubu.jpg" alt="Лабубу" class="product-img">
                    <h3 class="product-name">Лабубу</h3>
                    <div class="price-block">
                    </div>
                    <div class="btn sale-soon">незабаром у продажі</div>
                </div>

                <div class="product-card">
                    <p class="category"> 
                        <a href="https://rozetka.com.ua/ua/robototehnika/c4630482/" target="_blank">
                            Робототехніка
                        </a>
                    </p>
                    <div class="line"></div>
                    <img src="images/robopsina.jpg" alt="Робот-пес" class="product-img">
                    <h3 class="product-name">Робот-пес</h3>
                    <div class="price-block">
                        <span class="current-price">1 959 грн</span>
                    </div>
                    <button class="btn add-cart">у корзину</button>
                </div>

               
                <div class="product-card">
                    <span class="badge hit">хіт продажів</span>
                    <p class="category"> 
                        <a href="https://rozetka.com.ua/ua/nastoljnye-igry-i-golovolomki/c98280/" target="_blank">
                            Настільні ігри
                        </a>
                    </p>
                    <div class="line"></div>
                    <img src="images/monopoly.jpg" alt="Монополія" class="product-img">
                    <h3 class="product-name">Монополія</h3>
                    <div class="price-block">
                        <span class="current-price">1 870 грн</span>
                    </div>
                    <button class="btn add-cart">у корзину</button>
                </div>

                
                <div class="product-card">
                    <span class="badge hit">хіт продажів</span>
                    <p class="category"> 
                        <a href="https://rozetka.com.ua/ua/bizibordi/c4674139/" target="_blank">
                            Бізіборди
                        </a>
                    </p>
                    <div class="line"></div>
                    <img src="images/bizicube.jpg" alt="Бізікуб" class="product-img">
                    <h3 class="product-name">Бізікуб</h3>
                    <div class="price-block">
                        <span class="old-price">2 623 грн</span>
                        <span class="current-price">1 993 грн</span>
                    </div>
                    <button class="btn add-cart">у корзину</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
